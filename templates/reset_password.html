{% extends "base.html" %} {% block title %}Reset Password{% endblock %} {% block
content %}

<h1 class="mb-4 text-center">🔑 Choose a New Password</h1>

{% with messages = get_flashed_messages() %} {% if messages %}
<div class="alert alert-warning">
  {% for msg in messages %}
  <div>{{ msg }}</div>
  {% endfor %}
</div>
{% endif %} {% endwith %}

<div class="card p-4 shadow-sm" style="max-width: 450px; margin: 0 auto;">
  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-3">
      <label>New Password:</label>
      <input type="password" name="password" class="form-control" minlength="8" required autofocus />
      <small class="text-muted">At least 8 characters.</small>
    </div>
    <div class="mb-3">
      <label>Confirm New Password:</label>
      <input type="password" name="confirm_password" class="form-control" minlength="8" required />
    </div>
    <button type="submit" class="btn btn-success w-100">Update Password</button>
  </form>
</div>

{% endblock %}
