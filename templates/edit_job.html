{% extends "base.html" %}
{% block title %}Edit Job{% endblock %}
{% block content %}

<div class="mb-4">
  <h2 class="fw-bold">Edit Job</h2>
  <p class="text-muted mb-0">{{ job.client_name }}</p>
</div>

<div class="card shadow-sm mb-4">
  <div class="card-body p-4">
    <form method="POST" enctype="multipart/form-data">

      <div class="mb-4">
        <label class="form-label fw-semibold">Client Name</label>
        <input type="text" name="client_name" class="form-control form-control-lg"
               value="{{ job.client_name or '' }}" required />
      </div>

      <div class="row mb-3">
        <div class="col-md-6 mb-3 mb-md-0">
          <label class="form-label fw-semibold">Phone</label>
          <input type="tel" name="phone" class="form-control" value="{{ job.phone or '' }}" placeholder="555-123-4567" />
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Email</label>
          <input type="email" name="email" class="form-control" value="{{ job.email or '' }}" placeholder="client@email.com" />
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Address</label>
        <input type="text" name="address" class="form-control" value="{{ job.address or '' }}" placeholder="123 Main St, City, State" />
      </div>

      <div class="row mb-4">
        <div class="col-md-6 mb-3 mb-md-0">
          <label class="form-label fw-semibold">Soft Deadline <span class="text-muted fw-normal">(internal)</span></label>
          <input type="date" name="soft_deadline" class="form-control"
                 value="{{ deadline.soft_deadline.strftime('%Y-%m-%d') if (deadline and deadline.soft_deadline) else '' }}" />
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Hard Deadline <span class="text-muted fw-normal">(client-facing)</span></label>
          <input type="date" name="hard_deadline" class="form-control"
                 value="{{ deadline.hard_deadline.strftime('%Y-%m-%d') if (deadline and deadline.hard_deadline) else '' }}" />
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold">Notes</label>
        <textarea name="notes" class="form-control" rows="2" placeholder="Project notes...">{{ job.notes or '' }}</textarea>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold">Upload Files <span class="text-muted fw-normal">(optional)</span></label>
        <input type="file" name="job_files" multiple class="form-control" />
      </div>

      <div class="d-flex gap-2 justify-content-end">
        <a href="{{ url_for('job_details', job_id=job.id) }}" class="btn btn-outline-secondary px-4">Cancel</a>
        <button type="submit" class="btn btn-primary px-4">Save Changes</button>
      </div>

    </form>
  </div>
</div>

<div class="card shadow-sm">
  <div class="card-header fw-semibold">Continue Setup</div>
  <div class="card-body d-flex gap-2 flex-wrap">
    <a href="{{ url_for('job_step_parts', job_id=job.id) }}" class="btn btn-outline-primary">
      + Add / Edit Parts
    </a>
    <a href="{{ url_for('job_step_accessories', job_id=job.id) }}" class="btn btn-outline-secondary">
      + Add / Edit Accessories
    </a>
    <a href="{{ url_for('create_detailed_estimate', job_id=job.id) }}" class="btn btn-outline-success">
      + Create Estimate
    </a>
  </div>
</div>

{% endblock %}
