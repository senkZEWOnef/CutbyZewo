{% extends "base.html" %}
{% block title %}New Job — Step 1{% endblock %}
{% block content %}

<div class="mb-4">
  <h2 class="fw-bold">New Job</h2>
</div>

<!-- Step indicator -->
<div class="d-flex align-items-center gap-2 mb-4 p-3 bg-light rounded overflow-auto flex-nowrap">
  <span class="badge bg-primary rounded-pill px-3 py-2">1</span>
  <span class="fw-bold">Client Info</span>
  <span class="text-muted mx-1">›</span>
  <span class="badge bg-secondary rounded-pill px-3 py-2">2</span>
  <span class="text-muted">Parts</span>
  <span class="text-muted mx-1">›</span>
  <span class="badge bg-secondary rounded-pill px-3 py-2">3</span>
  <span class="text-muted">Accessories</span>
  <span class="text-muted mx-1">›</span>
  <span class="badge bg-secondary rounded-pill px-3 py-2">4</span>
  <span class="text-muted">Estimate</span>
</div>

<div class="card shadow-sm">
  <div class="card-body p-4">
    <form method="POST">
      <div class="mb-4">
        <label class="form-label fw-semibold">Client Name</label>
        <input
          type="text"
          name="client_name"
          class="form-control form-control-lg"
          placeholder="e.g. John Doe"
          required
          autofocus
        />
      </div>

      <div class="row mb-4">
        <div class="col-md-6 mb-3 mb-md-0">
          <label class="form-label fw-semibold">Phone <span class="text-muted fw-normal">(optional)</span></label>
          <input type="tel" name="phone" class="form-control" placeholder="e.g. 555-123-4567" />
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Email <span class="text-muted fw-normal">(optional)</span></label>
          <input type="email" name="email" class="form-control" placeholder="client@email.com" />
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold">Address <span class="text-muted fw-normal">(optional)</span></label>
        <input type="text" name="address" class="form-control" placeholder="123 Main St, City, State" />
      </div>

      <div class="row mb-4">
        <div class="col-md-6 mb-3 mb-md-0">
          <label class="form-label fw-semibold">Soft Deadline <span class="text-muted fw-normal">(internal)</span></label>
          <input type="date" name="soft_deadline" class="form-control" />
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Hard Deadline <span class="text-muted fw-normal">(client-facing)</span></label>
          <input type="date" name="hard_deadline" class="form-control" />
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold">Notes <span class="text-muted fw-normal">(optional)</span></label>
        <textarea name="notes" class="form-control" rows="2" placeholder="e.g. Client wants soft-close hinges, measure again before cutting"></textarea>
      </div>

      {% if templates %}
      <div class="mb-4">
        <label class="form-label fw-semibold">Start from a Template <span class="text-muted fw-normal">(optional)</span></label>
        <select name="template_id" class="form-select" onchange="showTemplatePreview(this)">
          <option value="">— No template, start fresh —</option>
          {% for t in templates %}
          <option value="{{ t.id }}"
                  data-parts="{{ t.parts | length }} part type{{ 's' if t.parts | length != 1 }}"
                  data-accs="{{ t.accessories | length }} accessory item{{ 's' if t.accessories | length != 1 }}">
            {{ t.name }}
          </option>
          {% endfor %}
        </select>
        <div id="tpl-preview" class="mt-2 small text-muted" style="display:none;"></div>
      </div>
      {% endif %}

      <div class="d-flex gap-2 justify-content-end">
        <button type="submit" name="action" value="save_exit" class="btn btn-outline-secondary px-4">
          Save &amp; Exit
        </button>
        <button type="submit" name="action" value="next" class="btn btn-primary px-4">
          Next: Add Parts ›
        </button>
      </div>
    </form>
  </div>
</div>

<script>
function showTemplatePreview(sel) {
  const preview = document.getElementById('tpl-preview');
  const opt = sel.options[sel.selectedIndex];
  if (!sel.value) { preview.style.display = 'none'; return; }
  preview.style.display = 'block';
  preview.textContent = `Will import: ${opt.dataset.parts}, ${opt.dataset.accs}`;
}
</script>

{% endblock %}
